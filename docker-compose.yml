
# Pinned image versions — bump in lockstep with docker/*.Dockerfile.
#   MONGO = 7.0.15
# Requires Docker Engine >= 24.0 and Docker Compose >= 2.20 (Compose Spec).
# The legacy top-level `version:` key is intentionally omitted (deprecated in Compose v2).

services:
  masqueradarr:
    image: iflip721/masqueradarr:0.0.1-dev
    user: "${APP_USER_ID:-1000}:${APP_GROUP_ID:-1000}"
    build:
      context: .
      dockerfile: docker/app.Dockerfile
    environment:
      # Infra config: the app self-provisions config.json on boot (docker/app-entrypoint.sh)
      # from these creds — mongoUri = mongodb://<user>:<pass>@mongo:27017/masqueradarr?authSource=admin
      # (creds URL-encoded). Same vars seed the `mongo` service's root user, so they always match.
      MONGO_ROOT_USER: ${MONGO_ROOT_USER}
      MONGO_ROOT_PASS: ${MONGO_ROOT_PASS}
      # Optional external/remote Mongo override (e.g. Atlas). Set MONGO_URI to a full connection
      # string (used verbatim) or just MONGO_HOST to point at a non-compose host.
      # MONGO_URI: ${MONGO_URI:-}
      # MONGO_HOST: ${MONGO_HOST:-mongo}
      # App settings seeded into the Mongo `settings` doc on first provisioning ($setOnInsert — a
      # redeploy never clobbers values changed later in the UI). Distinct from infra config
      # (mongoUri/port/logLevel) above. See server/src/sources/seedSettings.ts.
      DISPLAY_NAME: ${DISPLAY_NAME:-masqueradarr}
      DOMAIN: ${DOMAIN:-http://localhost:3000}
      TZ: ${TZ:-America/New_York}
      # Outbound-fetch DNS nameserver(s) for the app's OUTBOUND fetch() (IPTV catalogs, mirror
      # directories, EPG, HLS proxy) are NO LONGER env-driven: the persisted `settings.nameservers`
      # seeds on first provision ($setOnInsert) with a hardcoded default (8.8.8.8,8.8.4.4 — Google
      # public DNS).
      DNS_LOG_LEVEL: ${DNS_LOG_LEVEL:-2}
    ports:
      - "3000:3000"
    volumes:
      # Composed .m3u + XMLTV guide exports. Bind-mounted to a host path so they survive a
      # container rebuild. Set COMPOSE_PATH in .env; the host dir must be writable by uid 1000
      # (the container's `node` user). (config.json is no longer mounted — the app generates it
      # internally at /app/config/config.json from the env above on every boot.)
      - ${COMPOSE_PATH:-./compose}:/app/compose:rw
      # Scheduled-backup target (settings.backupLocation defaults to /backups). Optional bind mount
      # so backups survive a rebuild; defaults to ./backups when BACKUPS_PATH is unset. Same uid-1000
      # writability caveat as COMPOSE_PATH.
      - ${BACKUPS_PATH:-./backups}:/backups:rw
    depends_on:
      mongo:
        condition: service_healthy
    networks: [masqueradarr-net]
    restart: unless-stopped
    # ── Hardware-accelerated transcoding (WS6, opt-in) ──────────────────────────────────────────────────
    # The externalPlayer engine (Settings → Video Configuration → Hardware acceleration) can offload transcoding
    # to a GPU. The image already bundles a multi-vendor ffmpeg (jellyfin-ffmpeg: VAAPI/QSV/NVENC) on a glibc
    # base, so no special image tag is needed — just pass the GPU. The server detects usable encoders at boot →
    # videoconfig.hwAccel.detected (the card offers only those). Enable ONE of the following (left commented — a
    # `devices:` entry for a missing node stops the container from starting, so don't uncomment on a GPU-less host):
    #   • Intel Quick Sync / AMD VAAPI — pass the render node and join the group that owns it so uid 1000 can open it:
    #       devices: ["/dev/dri:/dev/dri"]
    #       group_add: ["${RENDER_GID:-44}"]   # GID owning /dev/dri/renderD128 on the host: stat -c '%g' /dev/dri/renderD128
    #   • NVIDIA NVENC — install nvidia-container-toolkit on the host (the image already ships an nvenc-enabled
    #     ffmpeg + NVIDIA_DRIVER_CAPABILITIES=compute,video,utility baked in), then:
    #       deploy:
    #         resources:
    #           reservations:
    #             devices: [{ driver: nvidia, count: all, capabilities: [gpu] }]

  mongo:
    # If you have issues using MongoDB 7.x due to legacy hardware switch value for MongoDB 4.x or highe
    image: mongo:7.0.15
    user: "${MONGO_USER_ID:-999}:${MONGO_GROUP_ID:-999}"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASS}
    ports:
      # Expose mongod on the host. Override the host-side port with
      # MONGO_HOST_PORT in .env (defaults to 27017).
      - "${MONGO_HOST_PORT:-27017}:27017"
    volumes:
      # Persistent MongoDB data. Set MONGO_DATA_PATH in .env to an absolute
      # host path (e.g. /srv/masqueradarr/mongo) for a bind mount; leave unset to
      # use the named volume defined below.
      - ${MONGO_DATA_PATH:-mongo-data}:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [masqueradarr-net]
    restart: unless-stopped

volumes:
  # Fallback named volume — used only when MONGO_DATA_PATH is unset.
  mongo-data:

networks:
  masqueradarr-net:
